version: '3.8'

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile.devcontainer
    container_name: marketingtool-dev
    volumes:
      - .:/workspace
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      - node_modules:/workspace/node_modules
    ports:
      - "3000:3000"
      - "4321:4321"
    working_dir: /workspace
    command: tail -f /dev/null
    environment:
      - NODE_ENV=development

volumes:
  node_modules:
